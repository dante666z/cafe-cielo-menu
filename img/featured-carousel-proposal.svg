  <rect x="671" y="686" width="34" height="12" rx="6" fill="url(#accent)"/>
  <circle cx="724" cy="692" r="6" fill="#5B4E46"/>
  <circle cx="744" cy="692" r="6" fill="#5B4E46"/>
  <circle cx="814" cy="692" r="22" fill="#343542" stroke="#4B4D5E"/>
  <text x="814" y="700" text-anchor="middle" fill="#FFF1E2" font-family="Arial, sans-serif" font-size="22">→</text>

  <text x="100" y="730" fill="#CDB9A7" font-family="Arial, sans-serif" font-size="16">Si te late esta direccion, la implementamos con esta jerarquia visual.</text>
