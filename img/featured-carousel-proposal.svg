  <text x="1130" y="568" fill="#A57124" font-family="Arial, sans-serif" font-size="13" font-weight="700">Swipe / autoplay</text>

  <circle cx="620" cy="692" r="22" fill="#343542" stroke="#4B4D5E"/>
